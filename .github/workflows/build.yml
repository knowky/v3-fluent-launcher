name: Build & Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install Rust stable
        run: rustup default stable

      - name: Build Frontend
        run: npm run build

      - name: Build Tauri (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: '.'
          args: --target x86_64-pc-windows-msvc
          tagName: v__VERSION__
          releaseName: 'Victoria 3 Fluent Launcher v__VERSION__'
          releaseBody: |
            ## Victoria 3 Fluent Launcher v__VERSION__
            
            ### 🌌 Aurora (极光) 主题
            - 全新极光配色方案：翠绿/青色/蓝色/紫色渐变
            - Glass 玻璃材质效果
            - 流畅动画过渡
            
            ### 功能亮点
            - 🎮 现代化仪表盘，实时统计总览
            - 📦 Mod 工作室：网格/列表/详情三种视图
            - 🔍 冲突解决中心：三级检测引擎
            - 💾 存档指挥中心：时间线 + 健康检测 + 备份管理
            - 🚀 场景化一键启动：Mod组合+存档+配置
            - ⚙️ 配置中心：图形设置 + 启动参数 + 场景管理
            - 🛠️ 工具箱：日志分析/建设计算/性能优化/缓存清理
            
            ### 安装方式
            1. 下载 `Victoria.3.Fluent.Launcher_*.msi` 安装包
            2. 或下载 `Victoria.3.Fluent.Launcher_*.exe` 便携版
            3. 首次运行会自动引导设置
            
            ### 系统要求
            - Windows 10 1809+ 或 Windows 11
            - WebView2 Runtime (通常已预装)
          releaseDraft: false
          prerelease: false
          includeDebug: false
          includeRelease: true
          includeUpdaterJson: true

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: TypeScript Check
        run: npx tsc --noEmit || echo "TypeScript check skipped (non-blocking)"

      - name: Lint
        run: npx eslint src/ --ext .ts,.tsx || echo "Lint warnings (non-blocking)"
